name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests (Testcontainers)
        run: mvn verify -B
        # ubuntu-latest has Docker pre-installed.
        # Testcontainers auto-detects /var/run/docker.sock — no DinD setup needed.
        # -B = batch mode (no colour codes, clean CI output)

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (TypeScript + Vite)
        working-directory: frontend
        run: npm run build
        # npm run build = tsc -b && vite build (see frontend/package.json)
        # TypeScript errors fail the build; serves as type-check gate

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail -X POST "$RENDER_DEPLOY_HOOK_URL"

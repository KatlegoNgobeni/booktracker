spring.application.name=booktracker

# Disable open-in-view (Spring Boot 3 defaults true; explicit false avoids the warning
# and prevents lazy-loading issues in production)
spring.jpa.open-in-view=false

# All controllers served under /api
server.servlet.context-path=/api

# Flyway — baseline on migrate so existing schemas work cleanly;
# disable auto-migration against missing datasource (datasource configured in Plan 02)
spring.flyway.enabled=false

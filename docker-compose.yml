# ============================================================
# BookTracker — local development stack
#
# Usage:
#   1. Copy .env.example to .env and set POSTGRES_PASSWORD (and
#      optionally POSTGRES_DB / POSTGRES_USER).
#   2. docker compose up
#   3. curl localhost:8080/api/health   →  {"status":"ok"}
#
# Secrets flow:
#   .env (gitignored) → compose runtime → container environment.
#   No password appears in this file or in the Docker image.
# ============================================================

services:

  # ----------------------------------------------------------
  # db: Postgres 16
  # ----------------------------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------------
  # app: Spring Boot 3 application
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Datasource — read by application.properties from these env vars.
      # The hostname 'db' resolves to the postgres service on the compose network.
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres_data:

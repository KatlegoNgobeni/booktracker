spring.application.name=booktracker

# Disable open-in-view (Spring Boot 3 defaults true; explicit false avoids the warning
# and prevents lazy-loading issues in production)
spring.jpa.open-in-view=false

# All controllers served under /api
server.servlet.context-path=/api

# ============================================================
# Datasource — configured from environment variables only.
# No literal host/password; values flow from the developer's
# local .env (gitignored) via docker-compose or direct export.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate: validate only — Flyway owns the schema.
# Never allow Hibernate to auto-create or auto-update tables.
spring.jpa.hibernate.ddl-auto=validate

# Flyway: enabled now that a datasource is configured.
# Flyway runs V1__initial_schema.sql automatically on startup.
spring.flyway.enabled=true

# ============================================================
# JWT — loaded from environment variable only (D-07).
# JWT_SECRET must be a base64-encoded value that decodes to
# at least 32 bytes (use: openssl rand -base64 32).
# ============================================================
jwt.secret=${JWT_SECRET}

# ============================================================
# Open Library — external book search API (Phase 3, BOOK-01).
# base-url is the only required property; timeouts use ISO-8601
# duration format so @Value can bind them directly to java.time.Duration.
# ============================================================
openlibrary.base-url=https://openlibrary.org
openlibrary.connect-timeout=PT5S
openlibrary.read-timeout=PT10S
# User-Agent sent on every outbound Open Library request (BOOK-03).
# Override via OPENLIBRARY_USER_AGENT env-var or application-*.properties.
openlibrary.user-agent=BookTracker/1.0 (91katlego@gmail.com)
